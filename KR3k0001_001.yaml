body:
  text: 古今同姓名録卷上梁元帝撰唐陸善經續元葉森補三伯夷一舜典作秩宗一顓頊師一孤竹君之子二唐叔一虞之季世一周武王用其名二南宮適一周之十人一孔子時二殷帝乙一湯之諡一殷二十九世王尚書一紂父史記二穆伯一敬姜夫禮記一聲已夫三禮引春秋二文伯一敬姜子禮記一聲已子三禮引春秋二杜喬一見禮記一後漢時人二石乞一與白公作亂一敵子路者二把梁一古詩把梁妻一左傳齊侯遇于郊疑一人二申繻一魯桓公時一魯昭公時疑一人二箕遺一范宣子所殺一濟師取前城二服䖍一見漢獻帝春秋一注左氏傳者二市南宜僚一㺯丸釋難者莊子一姓熊當五百人左傳二莊賈一為司馬穰苴所殺一陳勝御人二京房一字君明善易前漢一梁邱賀從之受易前漢三曾參一孔子弟子字子輿一殺人者見說苑一字君孝豫章孝亷二婁緩一六國時一淮南王賔前漢二申屠嘉一出莊子一前漢人丞相故安侯二欒巴一後漢郡守字叔元一後漢術士後漢方技傳噀酒滅火二宛春一楚成王將一衛靈公時諫開池者吕不韋春秋二𫝊毅一字武仲一護羌校尉戰死封侯後漢二羿一堯時射十日者一有窮之君二郤儉一術士華他論一晉人二夏侯勝一前漢太子太傅字長公一魏人夏侯勤之子二士丐一士鞅父春秋一士鞅之相春秋昭公六年三士燮一范文子一吳人三國吳志字彥威一隋時官侍郎出隋書此陸善經續二公孫龍一孔子弟子一白馬非白者吕不韋春秋三公孫敖一春秋穆公時人一與齊侯俱死一前漢人年表合騎侯六公孫宏一子産一出列子一前漢年表一前漢丞相平津侯一東觀漢記一幽州從事晉人葉森謹按左傳鄭公族駟氏公子喜之孫公孫宏字子般今梁元帝録曰子産非産當作子般者是三龎涓一戰國魏將一見七略一三國時張既禮辟之葉續一四王豹一春秋時齊國人一西河人善歌一京兆人三輔决録一晉人八王喬一周太子即靈王太子晉也一古仙人師高晨君出太子經一後漢葉縣令一河東人袁山松漢書一晉廬陵太守一魏人見趙王傳一上古神仙歷五帝三代或隱或顯又非前師高晨君者一武陽人食肉芝得仙並出王氏神仙傳葉續三六王良一古之善御者孟子一光武時司空一作白鷹贊中經注一後漢隱士與周黨同列一為史官作奉常見乞伏傳一東漢儒林傳傳伏生尚書者葉續一十一王褒一前漢字子淵一前漢年表一魏武西都尉獻石膽博物志一字偉元一見溫嶠集一晉元帝時一晉牙門將起居注一將薪市易一梁僕射按北史王褒於後周時又為少司空字子深出北史文苑傳此陸善經續一漢成帝時絳衣入宫言天帝令我居此見後漢五行傳人痾一字子登范陽襄平人漢末成仙號清虛真人王氏神仙傳葉續二八王吉一字子陽前漢一重泉人字少音出前漢儒林周堪傳一朱崖舊事一為虎賁字伯騫風俗通一莽之孫一後漢酷吏傳一臨邛人一宋崇寧間仙人出集仙傳葉續一十王宏一前漢一魏尚書郎一晉丹陽督郵一太原人一監校建康市估錢晉起居注一宋司徒字休元按南史王宏本傳應作宋太保一謝符采妻父世宗中書侍郎謝氏譜一隋揚州刺史此陸善經續一東漢安帝騎都尉一唐人王宏中之子見韓文葉續二六王烈一後漢字彥考一崇邑人魏武集云任為丞相徴事一符健攻冉閔南中郎將王烈一字陽季東平人王堪父為治書御史一與嵇康見石隨者晉人字長休一晉牙門將起居注六王恢案下所列祗有五人六當作五一魏思成王時紀年一前漢大行一晉惠帝時東牟人起居注一王溢弟即導之子一西漢中郎將捕得車師王封浩侯葉續一六王濟一渾之子字武子一晉元帝散騎常侍一慕容廆長史一凉州人字世業為僞史官一宋巴東太守一宋鎮州通判出宋通鑑葉續一五王龔一字伯宗東漢一光祿勳東漢一賈逵所薦見賈逵傳一假楊陵校尉傳咸傳一名恭字伯孝晉人五王敦一長流人字仲異三輔决録一魏黃初時人一孫權主簿一羅尚牙門將實録一晉大將軍五王圭一晉僕射一齊人一唐太宗相此陸善經續一一仁宗朝戰于好水川宋通鑑一神宗相字禹玉葉續二四王衍一晉人字夷甫一石虎將一五代蜀王一字文舒魏兖州刺史為爾朱仲逺所擒以其名望不害令騎牛以從軍者葉續二四王陵一秦大夫白起傳一前漢功臣安國侯一魏人字彥雲一晉人上郡男兒起居注四王商一宣帝時樂昌侯前漢一胸奴畏者前漢一王莽叔成都景侯一蜀郡守四王舜一漢宣帝時安平侯一王音之子前漢一趙后傳故中黃門一車騎大將軍涪之子四王霸一光武將一字孺仲東漢隱士一晉人字叔稚一後魏道武時此陸善經續一三王式一前漢儒林傳一淮南小中正晉卞壺𫝊一晉謁者僕射晉事要三王莽一魏惠王時人紀年一字稚叔昭帝時衛尉西漢百官公卿表一字巨君篡漢三王尋一王莽將光武敗之昆陽一晉武帝牙門將起居注一晉光祿大夫河東人三王導一晉丞相字茂宏一晉京陵公起居注一永徽中人此陸善經續一三王蒙一王充之祖論衡一應元字晉人一蔡謨親搜神記三王沉一晉人字處道一劉聰宦者一字彥伯作釋時論三王怡一導之孫為中領軍一晉永和中吳內史一永和中姑孰令甘露降三王邵一東漢孝亷一琅琊人一北齊人此陸善經續一三王陽一前漢一東觀漢記一石勒引為將葉續一三王鳯一成帝舅前漢敬成侯一光武將一王文操之子與父戰死定州唐宗室霍王傳葉續一三王渙一東漢洛陽令一河內人東漢考城令一宋禮部侍郎與杜祁公睢陽五老㑹者葉續一二王孫賈一出論語一事齊閔王二王獻之一東漢人一晉人善書者羲之之子二王允一東漢司徒靈帝時字子師一晉江州刺史三王朔一西漢人一趙規小吏與黃萌爭水殺規而朔復殺萌汝南先賢𫝊一晉穆帝時造歷者出晉律歷志葉續一二王俊一三國時一中郎將使胸奴二王談一前漢元帝時平阿侯一趙一所殺者二王忳一字少林致飛被走馬者一晉帝舅正員外二王坦一字方山王業子汝南先賢傳一字文度晉人按王文度名坦之此但作王坦誤二王仲宣一粲字一名陽益州刺史見碑集又二見葉森續二王充一字仲任作論衡一景帝時蓋靖侯西漢王信之孫二王渾一戎父晉人一濟父字元冲伐吳者二王混一導孫晉人一晉始安太守二王肅一漢司徒朗之子注周易神女授與墨者一魏文帝時尚書令對茶為酪奴者北史九張良一留侯字子房一又前漢一東漢秃髮傳按晉書秃髮載記有張良此作東漢秃髮傳疑誤一東漢人一字仲文魏倉部郎中一晉石勒傳一晉冉閔時人一晉起居注一護羌校尉戰死封侯九張敞一漢京兆尹為妻畫眉者一字顯明廣平棘陽令一東漢竇武傳一王莽傳西漢一晉太子中庶子一晉孝武太子中舍一魏人東夷傳一宋侍中字彭祖吳國內史一唐神龍中試才高位下科出宋高續古緯略葉續一九張衡一字平子作思元賦一平陽人一隂平人王隱晉書一晉趙王倫後將軍一晉都督部曲誣益州刺史皇甫晏謀反者起居注一預殺隋文帝者一張道陵子白日仙去此陸善經續一一晉新昌人執縣宰降慕容皓者一宋仁宗嘉祐二年狀元及第仕至集賢院學士作編年通載者葉續二五張平一留侯父一魏漁陽太守與成公綏善一晉張華父一石季龍將軍一以中尉從高祖封鹵麗侯西漢年表葉續一按前漢書作鹵嚴侯五張禹一漢安昌侯一西漢侍御史字子長一名羽韓安國同時一東漢太傅一上郡太守為劉聰所攻晉書五張湛一漢司空字子孝光武時太子太傅一晉侍中江陵侯起居注一字處度注列子者一晉安帝中書郎直西省起居注一字子然燉煌人崔浩識而禮之北史葉續一五張溫一東漢司空一吳人字惠恕一冉閔時晉載紀一晉張軌父為太官令晉書一金人字元佐有詩名出中州集葉續二四張綱一東漢人字文紀一僞燕人有巧思為宋高祖所得一唐順宗永貞初杭州刺史奏置餘杭倉宇者出臨安志秋官考一宋高宗參政字彥正諡章簡葉續二四張翰一晉丹陽太守山濤啓事一字季鷹思蓴者一宋慶歷中江陵人張師正括異志一金人字林卿貞祐初户部侍郎中州集葉續二按金史張翰本傳為户部尚書三張騫一博望侯一後漢人牟子云一南陽人字子淵三張蒼一西漢相按張蒼於高祖時封北平侯一光武時東觀漢記一桓元僕射以莵字為兔字免官三張載一後漢宦者一晉人字孟陽一宋人字子厚號橫渠先生葉續一三張賀一漢掖庭令一東漢表守一陳時將此陸善經續一三張魯一東漢人號米賊五斗米道者一字昭國魏建安六年計吏一凉李皓太守此陸善經續一三張超一東漢文苑傳一東漢張邈兄一字世元廣平人二張子房一留侯字一巨鹿人魏建安六年法吏二張勝一為盧綰之臣一與蘇武在胸奴者二張湯一前漢舞文詆巧一出赫連勃勃傳二張毅一周人好事不堪其勞內中熱死者一前漢張蒼之孫二張芝一字伯英一魏鮑勛薦者見鮑集二張遼一漢桂陽太守一魏征東將軍二張昶一張芝弟也一秃髮烏孤臣晉載記二張陽一東漢岑彭傳一字稚叔見魏文帝集二張堪一漢郡守一晉州刺史二張子高一敞字西漢人一臨海人王導相府參議七張武一敞弟漢元帝時梁王相一前漢授金者一南郡獻白虎者一後漢獨行傳一見淮南子一晋人一唐昭宗時萬州刺史出通鑑葉續一十劉欽一溧陽侯一南頓令一光武父疑一人一桃山侯城陽孝王子一新市侯西漢年表廣川繆王孫一平度侯菑川懿王孫一即來侯城陽王孫一密鄉侯膠東頃王孫一淮陽憲王宣帝子並西漢一劉元海時武牙將軍葉續五十六劉宏一都梁節侯長沙定王孫一昌慮亷侯魯孝王子一東陽郡侯清河剛王子並漢年表一漢惠弟子一荆州牧一劉備父一晉武帝率更令一梁州害張實者一東漢人出劉文記一晉鎮南大將軍字和季一武陶侯廣川繆王孫一兹鄉侯城陽荒王子一容鄉侯趙共王孫西漢年表一高密哀王宣帝二年立按前漢書宣帝紀夲始元年立廣平王胥少子宏為高密王注云二年誤一隋誠節傳一唐武德初總管諫太宗勿追宋金剛者出通典兵志乘勝萹葉續六十四劉章一朱虛侯一東野侯中山靖王子一略陽侯一宣處侯中山康王子一宜節侯一雒陵侯長沙定王子西漢年表一名璋劉表子一楚元王子休侯之曾孫一高密哀王子頃王一襄鄉侯趙共王子一抑裴侯趙敬肅王孫按前漢書作揤裴侯原本抑裴侯誤一光武姪太原王東漢齊武王傳一順陽侯光武族兄中山王嘉之元孫一宋高宗紹興十五年舉人出宋通鑑葉續七十二劉德一河間獻王一劉向父宗正一成鄉侯高密頃王孫一廣陵孝王子廣平侯西漢年表一東漢平原王一北海人注漢書者一字敷思一劇魁侯菑川懿王子按前漢書劇魁侯黑菑川懿王子後元封元年思侯昭嗣四年康侯德嗣劉德乃菑川懿王孫也注以德為懿王子字有誤一易安侯趙敬肅王孫坐殺人免一定侯齊孝王孫一東漢東武城侯一彭城人太醫校尉出晉書葉續五三劉禮一宗正父帝言如兒戲者一西漢平城侯坐恐喝人取雞免一東漢劉隆父葉續一九劉寬一東襄侯廣川繆王子一廣武利王曽孫懷王一濟北貞王勃孫一臨雍侯城陽共王子一葛魁節侯菑川懿王子一趙敬肅王子漳北侯並西漢年表一東漢太尉字文饒一懷王高密王孫一阿武侯河間獻王孫葉續一七劉毅一春秋時周大夫殺佞夫者一東漢劉騊駼弟一北海敬王子東漢文苑傳一董卓長史一中經簿作論十三卷一字仲雄晉僕