body:
  text: 古今同姓名録卷下梁元帝撰唐陸善經續元葉森補二虞舜一有虞氏重華一東觀漢記二虞預一字叔寧一江東東陽人二虞丘夀王按漢書作吾丘此作虞丘又作吳丘蓋古吾虞吳三字通一西漢辨鼎者一别有吳丘說非趙人二夀夢一吳王一越大夫二秦政按録中稱虞舜周昌秦政皆以國號為姓非一始皇一韓非子所為死水者二鬷蔑一春秋晉人一齊崔杼所殺三邵平一秦東陵侯一晉末人一齊相史記劉肥傳葉附一又按史記索隱云東陵人邵平與東陵侯邵平及此邵平皆似别人也三孔子一字仲尼二皆鄭穆公之子按穆公子一子孔一士子孔此作孔子誤二孔文子一見左傳一晉奉車都尉二孔安國一漢人注論語者一晉餘不亭侯孔愈子二侯霸一王莽選用能吏一後漢字君房二姬滿一周穆王一王孫滿二郝隆一劉欽校書一晉人曬腹中書者二臧鴻一太保屬吏王莽傳一後漢人二荀爽一漢左將軍擊朝鮮縳楊僕者一後漢字慈明二江革一後漢有孝行一字休映南史梁朝二藺相如一戰國一蜀人殺劉季連者二宇文豆羅突一後周衛刺王直小字一趙僣王小字二于吉一北海人就帛公得素書者神仙傳一吳孫策慊惑衆殺之後見頭於鏡中者二范曄案下所引共有三人二當作三一後漢良吏一字蔚宗一福建人為王審知兄王潮攻滅者五代史葉附一按五代史閩世家王潮所擊殺者范暉原本蓋誤以暉為曄耳二吕才一吳人一唐初善隂陽二公孫臣一春秋時殺寧喜一前漢人二屠擊一晉人一鄭人左氏傳二費長房一勸桓景登髙者一隋時修道書者二石苞一晉石崇父一石虎父二刁大倫一名協嘲韓盧者一桓溫司馬二秋胡一晉人戲妻者一西京人傳尚書善古𨽻二扶生一漢書年表一僞秦苻生按扶苻不同未免牽合二閎孺一孝惠幸臣一漢廣陵人出風俗通二淳于長一西漢佞幸傳定陵侯一清平傅孔融集二梁統一字佐時太原人一後漢人二毛遂一平原君客一落井者二計子訓一薊子訓仙人也按薊子訓與計子訓不同未免牽合一與范曄同𫝊三柴武一西漢將一撰賦晉諸注之序一孫權將二龔遂一前漢一後漢九江太守字巨卿二丁固一季布同母弟一吳司空夢腹上生松者二霍光一漢大將軍一字德兒沛郡相建安六年中計吏二顧愷之一晉人字長康一宋將軍字伯虎晉陽秋三許由按下所引逰攸與由不同未免牽合一堯讓位者一名逰晉人一名攸袁紹時人二程鄭一晉人左傳一西漢人四顔回一孔子弟子一晉羌帥晉陽秋一孟獻子鬪臣說苑一許暹字葉附二二竇憲一和帝舅勒功燕然山者一字房儲為洛陽令者六胡廣一後漢字伯始一髙貴鄉公黃門郎一晉人字恭祖一晉大中大夫成紀子一薦周續之者一開府故吏晋起居注二蕭云一前漢一後漢四馬武一光武將一晉殿中監傅氏奏事一晉都水使舉戴洋者晉戴洋傳一張昌將晉張昌𫝊葉附二三宋宏一王莽時并州牧一字仲子東漢一太保見孔融集五戴良一後漢人一吳萊州刺史士燮傳一桓嶠咨議一晉臨川太守上章賀成帝加元服失㫖者起居注一戴淵弟之子房州刺史晉人六任安一東漢人儒林傳一晉大夫一慕容皓鴻臚載記一蜀志一監北軍使者以戾太子事受節懷二心要斬之西漢劉屈氂傳一宋宣和時畫院人出畫繼葉附二二陳仲弓一漢陳實字一齊於陵子字子終按子終非仲弓未免牽合二孫綽一吳人孫皓之子吳志一晉人字興公二裴寬一後周沔州刺史友悌著名一唐尚書韋詵壻號碧鸛雀者二崔豹一作古今注者一燕人載記二崔林一魏司空字德儒三公封侯始此一名琳唐三㦸崔家按琳與林不同未免牽合二崔浩一字伯淵後魏明帝祭酒一名皓唐詩人按崔皓與崔浩不同未免牽合二雷義一得人償珠拒云非我同姓名者二雷次宗一義之字一建昌人二董宣一漢强項令一晉惠帝謁者僕射三董仲舒一漢大儒一後周時對貂蟬出自兜鍪者一後魏術人俱云董仲二何無忌一甘卓主簿三國志一宋初功臣南史二何㸃一蜀李班司馬載記一南齊書二朱買臣一漢人五十當富貴者一梁元帝時人二朱博一漢御史一秦國內史載記二田光一燕太子丹時一田悅傳二田文一孟嘗君一韋賢丙吉時同為相森按史記云有善相工田文云韋魏丙三君皆丞相也此乃相工非與同為相二桓景一晉桓彛父一費長房弟子三桓彛一吳尚書字義則一桓溫父字茂倫一吳侍中李仁對程庾二侍郎詞二韋曜一吳人字宏嗣按韋曜本名韋昭三國志因避晉文帝諱而改作曜此與唐韋曜並列蓋考之未審也一唐安樂公主壻二韋悰一貞觀中左丞一宣宗宰相按新唐書宣宗宰相乃韋琮此作悰誤二郭槐一名淮字伯濟魏人一賈充妻三郭泰一字林宗一黃巾賊帥一出劉文靈傳四郭文一見王朗傳一晉遼妻議按此句疑有脫誤晉書祗載隱逸𫝊一郭文一晉隱士一吕光臣騂馬令二夏育一古勇士一後漢人二夏侯亶一字甫興晉人兄弟相代為荆州牧一字世龍梁人家貧好蓄妓樂二嚴延年一漢酷吏一字長孫二嚴武一吳人字子卿善棊一唐嚴挺之子二成公綏一晉人字士安作嘯賦一慕容超時載記二成濟一害髙貴鄉公者一張仲華時伏劍死二蔡澤一秦相一字伯洞林陽先賢傳二蔡雍一字伯喈一出異苑三杜鄴一與杜欽同字一又欽子業一漢昭帝建平敬侯杜延年孫名業葉附一按業與鄴不同未免牽合二杜子夏一杜林字一杜欽字並後漢人按二子夏皆前漢時人此云後漢誤三謝安一質帝時平都故吏下卒人封平鄉侯一東觀漢記一晉太傅字安石二謝沉一作後漢書者一字道昭朓再從兄二謝鯤一折屐齒者按晉書列傳謝鯤係鄰女投梭折齒者其過戶限而折屐齒乃謝安也且下謝琨亦非琨未免牽合一名琨宋人二賈捐之一字君房一為駙馬東漢二賈謨一晉江右平陽人一江左武國人字德範三賈充一前漢藝文志一更始將一晉人字公閭二髙宫一髙句麗王一王宫之孫生而張目時以為神因名之曰宫二髙柔一三國魏人一王蒙仲祖時人二髙雲一西秦時僣改元正始一唐人畫仕女上品二髙益一晉末殺慕容泓一唐天寶年作花蕚賦二尹賞一西漢酷吏一蜀太守二尹敏一後漢不識䜟者一晉率更令二吳廣一趙武靈王后父出列女傳一西漢陳勝傳三吳漢一光武將一趙王舅束晳家傳一魏史乞伏傳二吳良一後漢字太儀一後漢名梁字伯卿三吳質一字季重魏人一漢隂人建安六年計吏一仙人葉附一三徐偃一徐偃王無骨者春秋一西漢博士一松兹侯徐厲子按前漢書作祝兹侯此云松兹侯誤景帝中六年嗣侯葉附一二徐陵一吳後主時與陶璿討郭馬者一字孝穆南史三徐邈一魏人畫魚致獺者續齊諧記一晉王彌將一晉人二徐衍一負石入海者出莊子一東漢宦者三徐福一徐市音福字君房始皇使求藥者一上言霍氏者前漢一字元直即徐庶也始事游俠後折節於學魏略按徐庶本姓單名福改姓名為徐庶此直以為徐福亦考之未審三徐幹一東漢平清人字叔堅班超傳一魏人字偉長一字彥直晉益州刺史三韓朋一陳軫同時一巧士别録小記一出齊世家或名慿二韓安國一漢御史大夫一漢定襄太守馮奉世傳二韓終一仙人一西漢年表二韓信一淮隂侯一剖符王潁川者三韓嬰一襄城侯西漢年表一授韓詩者一歆之子東漢葉附一二韓博一薦巨無霸者一晉人守武封刁彛者二韓夀一賈充女與香者一慕容皓司馬載記二韓朗一後漢韓朗一晉殿中郎起居注二韓晃一晉將殺桓彛者一唐丞相名滉按滉與晃不同未免牽合二韓宏一唐掌書記制誥一同時刺史五楊雄按揚子雲以邑為氏與楊不同後人以楊修嘗稱修家子雲遂多有混作楊者此亦沿其悮也一字子雲作太元法言一名熊秦將與髙祖戰白馬一隋觀王一後周華隂人儻城郡公楊紹子一魯陽郡公字元略北史葉附二二楊敞一漢人一晉世曾宜之誘賣敞奴婢起居注二楊欣一晉凉州刺史晉馬隆傳一羊欣按羊欣與楊欣不同未免牽合二楊秉一後漢一晉振武將軍三楊廣一晉人字德度𢎞農人也一隗囂將一隋焬帝二楊播一北齊楊椿兄一炎之父唐元宗徴為諫議大夫棄官去二趙堯一西漢御史弄印者按前漢書周昌𫝊髙祖持御史大夫印㺯之曰誰可為御史大夫視堯曰無以易堯趙堯遂為御史大夫今云西漢御史弄印者文義不明一貢禹時人三趙勝一趙㫋子為東陽之師左傳襄公二十三年一平原君一魏孝文時太史令北史藝術張琛傳葉附一四趙逹一魏校書掾白徐邈飲酒者一吳興八絶逹算為一三國吳志一隋河東人為吏甚酷隋酷吏庫狄士文傳一宋孝宗中書舍人字莊叔資川人葉附二三趙咨一字文楚後漢一吳使魏者一字君初傅元傳二趙昂一與平原君同時一漢御史大夫二蘇建一武之祖一漢景帝時人三蘇章一西漢字游卿一東漢字士茂一字孺文二蘇峻一字師珍一字子髙五周昌一周文王一前漢汾隂悼侯一謂漢帝為桀紂主者一晉太康海西良吏晉起居注一晉人江州刺史五周勃一前漢絳侯一字世休封平亭侯武元令陳留人一東漢荆州刺史一漢成隂侯文帝十五年免侯一吳時山隂宿賊與黃羅漢聚黨吳董襲傳葉附一三周章一吳太伯初一漢項羽傳一後漢司空三周瑜一好事者一吳人字公瑾一梁列侯周鐵武之子葉附一二周舍一趙簡子時一晉臨川丞相舍人二周生一後漢一晉賣生留人起居注按生留未詳疑有誤三魏尚一陳留人字仲文一雲中守馮唐言之漢文帝者一豫章人字子崇官至潯陽太守三魏相一見左傳一前漢相一章帝時廷尉東觀漢記二魏顆一左傳見老人結草者一諷之弟二魏舒一中行穆子左傳一字陽元生南嶽魏夫人為舅氏宅相者晉書二符健按符健符融符熊之姓從草音蒲與符姓不同録中徴引並有誤一晉載記一武都氐王蜀後主時入降二符融一字偉長東漢仇覽傳一符堅弟陽平公二符熊一符健本名初父洪族祖建初生洪夢熊曰可以名吾子一字世業後避名外祖改此三孟賁一古勇士一後漢順帝常侍一武帝元朔三年少府百官公卿表葉附一三孟嘗一田文號一字伯周合浦還珠者一唐李孟嘗趙州人封漢東郡公葉附一二孟逹一蜀志一晉左衛率督二孟光一字孝裕蜀先主時一梁鴻妻二孟昶一與劉毅伐桓元者一五代蜀王二孟嘉一後漢人一桓溫長史二袁粲一晉尚書一宋司徒二袁宏一字彥伯一名閎字夏𣆀按閎與宏不同未免牽合三鄭崇一西漢一魏人渾之子一晉孝武折衝將軍討姚萇而殁二鄭宏一西漢字稚卿一東漢字巨君三鄭衆一東漢注禮者一東漢宦者一晉部曲督三鄭茂一漢武時壺關三老一南陽人死夢婦云復生開棺果生感應録二曹參一西漢相一淮南王謁者三曹夀一漢平陽侯尚武帝姊陽信長公主一犍為太守出蔡雍碑一曹大家壻二曹羲一字伯和晉相國一字昭侯魏將軍爽之弟五劉向一西漢字子政一唐人畫入上品一菑川懿王六世劇魁侯西漢一劉植子軍成侯東漢一齊天保八年於鄴謀逆者北史齊祖紀葉附三四劉晏一南齊謝朓友一字士安唐元宗時一廣川惠王子棗强侯一趙頃王子都鄉侯並西漢葉附二二劉道民一宋武帝小字一宋劉穆之小字二陸通一楚狂人一後周人字仲明二陸賈一造新語者一晉新平子吳國陸覬起居注二陸機一吳人字士衡一名璣字元恪注本草者按璣與機不同未免牽合三鄧曼一左傳公夫人按鄧曼係楚子夫人今作公夫人誤一後漢桓帝鄧后弟名萬出天文志按鄧萬與鄧曼不同未免牽合一楚武大夫二鄧