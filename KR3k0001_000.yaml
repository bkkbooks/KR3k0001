body:
  text: 提要古今同姓名録二卷類書類臣等謹案古今同姓名録二卷梁孝元皇帝撰是書見於梁書本紀及隋書經籍志者皆作一卷唐陸善經續而廣之故讀書志書録解題皆作三卷其本不傳此本為永樂大典所載則又元人葉森所增補者也雖輾轉附益已非其舊然幸其體例分明不相淆雜凡善經及森所綴入者皆一一標注尚可考見元帝之原本則類事之書莫古於是編矣史記淮隂侯列傳贊稱兩韓信此辨同姓名之始然劉知幾史通猶譏司馬遷全然不一别班固曽無更張至遷不知有兩子我故以宰豫為預田恆之亂不知有兩公孫龍故以堅白同異之論傅合於孔門之弟子其人相混遂其事俱淆更至於評斷失實則辨析異同殊别時代亦未嘗非讀史之要務非但綴瑣聞供談資也明萬厯中余寅别撰同姓名録十二卷周應賓又補一卷國朝王廷燦又補八卷所録比此本加詳然發凡起例終以此本為椎輪之始焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8ab04bdf3ee98d85c9a8dfe554a21dbb61be511e8c608f15511c420b33fff9b7
